   imgs:['1N-EjjMHfX_dP-Se0Yp54IJYXvQ0eHxoK','179B22EXu_2WuxjCPbd40vulsew8hPmbf','1mf106wpHH8m6qlt79kUxeUGACBMP50lB','1WVDoBmuTCB67b6w3swsGO1pyGk6xqVJs'],
   folder:'1xdJAMOI-2Kevv-o5lN6iMkG-eQfqg43f', pdf:null},
  {id:'003455', pet:'小花', sp:'cat',
   dx:'乳糜腹', dxEn:'Chylous Ascites',
   cat:'effusion', site:'腹水',
   imgs:['16SugMthwSsU5FwBfO_v6xYAB3YkoQ0Yi','1b5D8Dp7snqGrHv9SdlFAKkSrvVpAXF2I','1wciXNsbATAQbjEb1ys5aDkU8AxGOSvi9','1GN2iHWI43HEnZZZnOh4XAtgKZ4cjotu7','1jDtOH97-gH7M5pddueV9gqgsWi61UPcZ'],
   folder:'1M1ibVUhj-OrNa0QCVEh0rMV2d-jGeoA2', pdf:null},
  {id:'004552', pet:'啾比', sp:'cat',
   dx:'乳糜胸', dxEn:'Chylothorax',
   cat:'effusion', site:'胸水',
   imgs:['1ib5xoqN3KRgDCdOQZbi47LxtghgoWr7z','1p3bLlN1M6ieeVd0PgF7rIyTW5K0gB3_e','1rcdrbAiLmpJSO79S97WRRmtoYoFDlgE5','1vb25LdGUNqu2cR7osXQ9arUHeakGsJku'],
   folder:'1OjPm_7qVp2Rf_W5R7NVJvB0nFPinyY6u', pdf:null},
];

// State
let currentCat = 'all', currentSp = 'all', searchQ = '', currentDx = '', currentSection = 'cyto';
const HEMO_CATS = ['blood_smear','bone_marrow'];
const MICRO_CATS = ['urine_sed','fecal','skin_scrape'];
function getSection(c) {
  if (HEMO_CATS.includes(c.cat)) return 'hemo';
  if (MICRO_CATS.includes(c.cat)) return 'micro';
  return 'cyto';
}
let lbCaseIdx = 0, lbImgIdx = 0;

function imgUrl(id, size=640) {
  return `https://drive.google.com/thumbnail?id=${id}&sz=w${size}`;
}

// Populate disease dropdown
(function() {
  const sel = document.getElementById('dxSelect');
  const dxList = [...new Set(CASES.map(c => c.dx))].sort((a,b) => a.localeCompare(b,'zh-TW'));
  dxList.forEach(dx => {
    const opt = document.createElement('option');
    opt.value = dx; opt.textContent = dx;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() { currentDx = this.value; renderAll(); });
})();

function renderCard(c, idx) {
  const spLabel = c.sp === 'dog' ? '🐶 犬' : c.sp === 'cat' ? '🐱 貓' : c.sp === 'guinea_pig' ? '🐹 天竺鼠' : '🐾 其他';
  const firstImg = c.imgs[0];
  return `
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 case-card cat-${c.cat} sp-${c.sp}"
         data-cat="${c.cat}" data-sp="${c.sp}"
         data-search="${c.id} ${c.pet} ${c.dx} ${c.dxEn} ${c.site}">
      <div class="card-accent"></div>
      <div class="card-meta">
        <span class="badge-id">#${c.id}</span>
        <span class="badge-cat">${CAT_LABEL[c.cat]}</span>
        <span class="badge-sp">${spLabel}</span>
        ${c.morph ? `<span class="badge-morph morph-${c.morph}">${
          c.morph === 'round' ? '圓形細胞' :
          c.morph === 'epithelial' ? '上皮細胞' :
          c.morph === 'spindle' ? '紡錘細胞' :
          c.morph === 'inflammatory' ? '炎症' :
          c.morph === 'mixed' ? '其他' : c.morph
        }</span>` : ''}
      </div>
      <div class="card-img-area" data-case-idx="${idx}" data-img-idx="0"
           onclick="openLightbox(${idx}, parseInt(this.dataset.imgIdx))">
        <img src="${imgUrl(firstImg,640)}"
             alt="${c.dx}" class="loading-img"
             onload="this.classList.add('loaded')"
             onerror="this.parentElement.innerHTML='<div class=no-img-placeholder>圖片載入失敗<br><small>請確認已登入 Google</small></div>'">
        ${c.imgs.length > 1 ? `
          <button class="img-nav prev" onclick="navCardImg(event,${idx},-1)">&#8249;</button>
          <button class="img-nav next" onclick="navCardImg(event,${idx}, 1)">&#8250;</button>
          <span class="img-count" id="cnt-${idx}">1 / ${c.imgs.length}</span>` : ''}
      </div>
      <div class="card-body-custom">
        <h3>${c.dx}</h3>
        <div class="dx-en">${c.dxEn}</div>
        <div class="pet-info">🐾 <strong>${c.pet}</strong></div>
        <div class="site-info">📍 ${c.site}</div>
        ${c.note ? `<div style="font-size:0.72rem;color:#888;margin-top:0.25rem;border-top:1px solid #f0f0f0;padding-top:0.25rem">${c.note}</div>` : ''}
      </div>
      <div class="card-footer-custom">
        <button class="btn-sm-custom btn-gallery" onclick="openLightbox(${idx}, parseInt(document.querySelector('.card-img-area[data-case-idx=\"${idx}\"]')?.dataset.imgIdx||0))">
          🖼 圖片 (${c.imgs.length})
        </button>
        <a href="${DRIVE(c.folder)}" target="_blank" class="btn-sm-custom btn-drive">
          📁 資料夾
        </a>
        ${c.pdf ? `<a href="${PDF(c.pdf)}" target="_blank" class="btn-sm-custom btn-pdf">📄 報告</a>` : ''}
      </div>
    </div>`;
}

function renderAll() {
  const grid = document.getElementById('caseGrid');
  let html = '';
  let visible = 0;

  CASES.forEach((c, i) => {
    const secMatch  = getSection(c) === currentSection;
    const catMatch  = currentCat === 'all' || c.cat === currentCat;
    const spMatch   = currentSp === 'all'  || c.sp === currentSp;
    const dxMatch   = !currentDx || c.dx === currentDx;
    const q = searchQ.toLowerCase();
    const searchMatch = !q ||
      c.id.includes(q) || c.pet.toLowerCase().includes(q) ||
      c.dx.includes(q)  || c.dxEn.toLowerCase().includes(q) ||
      (c.site||'').includes(q) || (c.note||'').includes(q);
    if (catMatch && spMatch && dxMatch && searchMatch) { visible++; html += renderCard(c, i); }
  });

  grid.innerHTML = html;
  document.getElementById('resultsCount').textContent =
    `顯示 ${visible} / ${CASES.length} 個病例`;
  addCardSwipe();
}

function navCardImg(e, caseIdx, dir) {
  e.stopPropagation();
  const c = CASES[caseIdx];
  const area = document.querySelector(`.card-img-area[data-case-idx="${caseIdx}"]`);
  if (!area) return;
  let cur = parseInt(area.dataset.imgIdx || 0);
  cur = (cur + dir + c.imgs.length) % c.imgs.length;
  area.dataset.imgIdx = cur;
  const img = area.querySelector('img');
  if (img) { img.classList.remove('loaded'); img.src = imgUrl(c.imgs[cur], 640); }
  const counter = area.querySelector('.img-count');
  if (counter) counter.textContent = `${cur+1} / ${c.imgs.length}`;
}

function addCardSwipe() {
  document.querySelectorAll('.card-img-area[data-case-idx]').forEach(area => {
    let sx = 0, sy = 0;
    area.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    }, {passive: true});
    area.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) {
        const ci = parseInt(area.getAttribute('data-case-idx'));
        navCardImg({stopPropagation:()=>{}}, ci, dx < 0 ? 1 : -1);
      }
    }, {passive: true});
  });
}

// Section tabs
document.querySelectorAll('.section-tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.section-tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentSection = this.dataset.section;
    document.querySelectorAll('.filter-section').forEach(f => f.classList.remove('active'));
    document.getElementById('filter-' + currentSection).classList.add('active');
    currentCat = 'all';
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
    renderAll();
  });
});

// Filters
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentCat = this.dataset.cat;
    renderAll();
  });
});
document.querySelectorAll('[data-sp]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-sp]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentSp = this.dataset.sp;
    renderAll();
  });
});
document.getElementById('searchBox').addEventListener('input', function() {
  searchQ = this.value;
  renderAll();
});

// Lightbox
function openLightbox(caseIdx, imgIdx) {
  lbCaseIdx = caseIdx; lbImgIdx = imgIdx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function lbNav(dir) {
  const c = CASES[lbCaseIdx];
  lbImgIdx = (lbImgIdx + dir + c.imgs.length) % c.imgs.length;
  updateLightbox();
}
function updateLightbox() {
  const c = CASES[lbCaseIdx];
  document.getElementById('lbImg').src = imgUrl(c.imgs[lbImgIdx], 1600);
  document.getElementById('lbTitle').textContent = `#${c.id} ${c.pet} — ${c.dx}`;
  document.getElementById('lbSub').textContent = `${c.dxEn} | ${c.site}`;
  document.getElementById('lbCounter').textContent = `${lbImgIdx+1} / ${c.imgs.length}`;
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
});

// Lightbox swipe (mobile)
let _lbTx = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  _lbTx = e.touches[0].clientX;
}, {passive: true});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _lbTx;
  if (Math.abs(dx) > 40) lbNav(dx < 0 ? 1 : -1);
});

// Stats
const dogs = CASES.filter(c => c.sp==='dog').length;
const cats  = CASES.filter(c => c.sp==='cat').length;
const hasPdf = CASES.filter(c => c.pdf).length;
document.getElementById('headerStats').textContent =
  `共 ${CASES.length} 個病例 | 犬 ${dogs} 例 / 貓 ${cats} 例 | ${hasPdf} 份病理報告`;

renderAll();
</script>
</body>
</html>
