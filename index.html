// State
let currentCat = 'all', searchQ = '', currentDx = '';
let lbCaseIdx = 0, lbImgIdx = 0;

// Populate disease dropdown
(function() {
  const sel = document.getElementById('dxSelect');
  const dxList = [...new Set(CASES.map(c => c.dx))].sort((a,b) => a.localeCompare(b,'zh-TW'));
  dxList.forEach(dx => {
    const opt = document.createElement('option');
    opt.value = dx; opt.textContent = dx;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function() { currentDx = this.value; renderAll(); });
})();

function renderCard(c, idx) {
  const firstImg = c.imgs[0];
  return `
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 case-card cat-${c.cat}"
         data-cat="${c.cat}" data-search="${c.dx} ${c.dxEn} ${c.site}">
      <div class="card-accent"></div>
      <div class="card-meta">
        <span class="badge-cat">${CAT_LABEL[c.cat]}</span>
      </div>
      <div class="card-img-area" data-case-idx="${idx}" data-img-idx="0"
           onclick="openLightbox(${idx}, parseInt(this.dataset.imgIdx))">
        <img src="${imgUrl(firstImg,640)}"
             alt="${c.dx}" class="loading-img"
             onload="this.classList.add('loaded')"
             onerror="this.parentElement.innerHTML='<div class=no-img-placeholder>圖片未能顯示<br><small>請確認 Google Drive 已設為「任何人可查看」</small></div>'">
        ${c.imgs.length > 1 ? `
          <button class="img-nav prev" onclick="navCardImg(event,${idx},-1)">&#8249;</button>
          <button class="img-nav next" onclick="navCardImg(event,${idx}, 1)">&#8250;</button>
          <span class="img-count" id="cnt-${idx}">1 / ${c.imgs.length}</span>` : ''}
      </div>
      <div class="card-body-custom">
        <h3>${c.dx}</h3>
        <div class="dx-en">${c.dxEn}</div>
        <div class="site-info">📍 ${c.site}</div>
      </div>
      <div class="card-footer-custom">
        <button class="btn-sm-custom btn-gallery" onclick="openLightbox(${idx}, parseInt(document.querySelector('.card-img-area[data-case-idx=\"${idx}\"]')?.dataset.imgIdx||0))">
          🖼 圖片 (${c.imgs.length})
        </button>
      </div>
    </div>`;
}

function renderAll() {
  const grid = document.getElementById('caseGrid');
  let html = '';
  let visible = 0;

  CASES.forEach((c, i) => {
    const catMatch = currentCat === 'all' || c.cat === currentCat;
    const dxMatch  = !currentDx || c.dx === currentDx;
    const q = searchQ.toLowerCase();
    const searchMatch = !q ||
      c.dx.includes(q) || c.dxEn.toLowerCase().includes(q) || (c.site||'').includes(q);
    if (catMatch && dxMatch && searchMatch) { visible++; html += renderCard(c, i); }
  });

  grid.innerHTML = html;
  document.getElementById('resultsCount').textContent =
    `顯示 ${visible} / ${CASES.length} 個病例`;
  addCardSwipe();
}

function navCardImg(e, caseIdx, dir) {
  e.stopPropagation();
  const c = CASES[caseIdx];
  const area = document.querySelector(`.card-img-area[data-case-idx="${caseIdx}"]`);
  if (!area) return;
  let cur = parseInt(area.dataset.imgIdx || 0);
  cur = (cur + dir + c.imgs.length) % c.imgs.length;
  area.dataset.imgIdx = cur;
  const img = area.querySelector('img');
  if (img) { img.classList.remove('loaded'); img.src = imgUrl(c.imgs[cur], 640); }
  const counter = area.querySelector('.img-count');
  if (counter) counter.textContent = `${cur+1} / ${c.imgs.length}`;
}

function addCardSwipe() {
  document.querySelectorAll('.card-img-area[data-case-idx]').forEach(area => {
    let sx = 0, sy = 0;
    area.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    }, {passive: true});
    area.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) {
        const ci = parseInt(area.getAttribute('data-case-idx'));
        navCardImg({stopPropagation:()=>{}}, ci, dx < 0 ? 1 : -1);
      }
    }, {passive: true});
  });
}

// Filters
document.querySelectorAll('[data-cat]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentCat = this.dataset.cat;
    renderAll();
  });
});
document.getElementById('searchBox').addEventListener('input', function() {
  searchQ = this.value;
  renderAll();
});

// Lightbox
function openLightbox(caseIdx, imgIdx) {
  lbCaseIdx = caseIdx; lbImgIdx = imgIdx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function lbNav(dir) {
  const c = CASES[lbCaseIdx];
  lbImgIdx = (lbImgIdx + dir + c.imgs.length) % c.imgs.length;
  updateLightbox();
}
function updateLightbox() {
  const c = CASES[lbCaseIdx];
  document.getElementById('lbImg').src = imgUrl(c.imgs[lbImgIdx], 1600);
  document.getElementById('lbTitle').textContent = c.dx;
  document.getElementById('lbSub').textContent = `${c.dxEn} | ${c.site}`;
  document.getElementById('lbCounter').textContent = `${lbImgIdx+1} / ${c.imgs.length}`;
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'ArrowLeft')  lbNav(-1);
});

// Lightbox swipe
let _lbTx = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  _lbTx = e.touches[0].clientX;
}, {passive: true});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _lbTx;
  if (Math.abs(dx) > 40) lbNav(dx < 0 ? 1 : -1);
});

// Stats
document.getElementById('headerStats').textContent = `共 ${CASES.length} 個病例`;

renderAll();
</script>
